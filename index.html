<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Révision — Predictis</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1f3d;
    --blue: #1a4b8c;
    --blue-mid: #2563c4;
    --gold: #c9922a;
    --gold-light: #f5d98a;
    --green: #1a7a4a;
    --green-light: #d0f0e0;
    --red: #b03a2e;
    --red-light: #fce8e6;
    --cream: #f8f4ee;
    --white: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    color: var(--white);
    overflow-x: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 70% 20%, rgba(37, 99, 196, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 10% 80%, rgba(201, 146, 42, 0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.9;
  }

  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 8px;
  }

  .app-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }

  /* Category selector */
  .cat-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .cat-btn {
    flex: 1;
    min-width: 140px;
    padding: 12px 18px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .cat-btn:hover { border-color: var(--gold); color: var(--gold); }
  .cat-btn.active { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 700; }

  /* Progress */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    height: 5px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f5d98a);
    border-radius: 100px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 28px;
  }

  .score-badge {
    background: rgba(201,146,42,0.15);
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 100px;
    padding: 3px 12px;
    font-size: 12px;
    color: var(--gold-light);
    font-weight: 600;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 32px 30px 26px;
    margin-bottom: 18px;
    backdrop-filter: blur(10px);
    animation: slideIn .35s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-category {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 18px;
  }
  .q-category.assurance { background: rgba(37,99,196,0.25); color: #93c0ff; border: 1px solid rgba(37,99,196,0.4); }
  .q-category.mariage   { background: rgba(201,146,42,0.2); color: var(--gold-light); border: 1px solid rgba(201,146,42,0.35); }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(16px, 2.5vw, 20px);
    font-weight: 600;
    line-height: 1.45;
    color: var(--white);
    margin-bottom: 26px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    transition: all .18s;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    font-weight: 400;
    text-align: left;
    line-height: 1.4;
  }
  .option:hover:not(:disabled) { border-color: var(--gold); background: rgba(201,146,42,0.08); color: var(--white); transform: translateX(4px); }

  .option .opt-letter {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    flex-shrink: 0;
    transition: all .18s;
  }

  .option:hover:not(:disabled) .opt-letter { background: var(--gold); border-color: var(--gold); color: var(--navy); }

  .option.correct { border-color: var(--green); background: rgba(26,122,74,0.15); color: var(--white); }
  .option.correct .opt-letter { background: var(--green); border-color: var(--green); color: var(--white); }

  .option.wrong { border-color: var(--red); background: rgba(176,58,46,0.15); color: rgba(255,255,255,0.6); }
  .option.wrong .opt-letter { background: var(--red); border-color: var(--red); color: var(--white); }

  .option.disabled { cursor: not-allowed; opacity: 0.7; }
  .option.disabled:hover { transform: none; border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.8); }
  .option.disabled:hover .opt-letter { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.55;
    display: none;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .feedback.correct { background: rgba(26,122,74,0.15); border: 1px solid rgba(26,122,74,0.4); color: #8fdfb8; }
  .feedback.wrong   { background: rgba(176,58,46,0.12);  border: 1px solid rgba(176,58,46,0.35);  color: #f7a89e; }
  .feedback .fb-title { font-weight: 700; margin-bottom: 4px; font-family: 'Syne', sans-serif; font-size: 13px; }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .btn {
    padding: 12px 26px;
    border-radius: 100px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .5px;
  }
  .btn-primary { background: var(--gold); color: var(--navy); }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-secondary { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.12); }
  .btn-secondary:hover { background: rgba(255,255,255,0.13); color: var(--white); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Results screen */
  .results {
    text-align: center;
    padding: 48px 20px;
    animation: slideIn .4s cubic-bezier(.4,0,.2,1);
  }

  .results-emoji {
    font-size: 64px;
    margin-bottom: 20px;
    display: block;
  }

  .results-score {
    font-family: 'Syne', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .results-label {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 32px;
  }

  .results-breakdown {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .breakdown-item {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 22px;
    min-width: 120px;
  }

  .breakdown-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .breakdown-lbl { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .breakdown-num.ok { color: #8fdfb8; }
  .breakdown-num.ko { color: #f7a89e; }

  .results-msg {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    max-width: 380px;
    margin: 0 auto 32px;
    line-height: 1.6;
  }

  /* Screen toggle */
  #quiz-screen { display: block; }
  #result-screen { display: none; }
</style>
</head>
<body>
<div class="container">

  <header class="app-header">
    <div class="brand">✦ Predictis · Sylvain Pinna</div>
    <h1 class="app-title">Quiz de Révision</h1>
    <p class="app-sub">Assurance · Régimes Matrimoniaux · PACS</p>
  </header>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="cat-selector">
      <button class="cat-btn active" onclick="setFilter('all', this)">🎯 Tout mélanger</button>
      <button class="cat-btn" onclick="setFilter('assurance', this)">🛡 Assurance</button>
      <button class="cat-btn" onclick="setFilter('mariage', this)">💍 Mariage & PACS</button>
    </div>

    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-label">
      <span id="q-counter">Question 1 / 20</span>
      <span class="score-badge" id="score-label">Score : 0</span>
    </div>

    <div class="card" id="card">
      <div class="q-category assurance" id="q-cat">🛡 Assurance</div>
      <div class="question-text" id="q-text">...</div>
      <div class="options" id="options-list"></div>
      <div class="feedback" id="feedback">
        <div class="fb-title" id="fb-title"></div>
        <div id="fb-body"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQ()" disabled>← Précédent</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>Suivant →</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="results">
      <span class="results-emoji" id="res-emoji">🏆</span>
      <div class="results-score" id="res-score">18/20</div>
      <div class="results-label">Questions répondues</div>
      <div class="results-breakdown">
        <div class="breakdown-item"><div class="breakdown-num ok" id="res-ok">0</div><div class="breakdown-lbl">Bonnes rép.</div></div>
        <div class="breakdown-item"><div class="breakdown-num ko" id="res-ko">0</div><div class="breakdown-lbl">Mauvaises rép.</div></div>
        <div class="breakdown-item"><div class="breakdown-num" id="res-pct" style="color:var(--gold)">0%</div><div class="breakdown-lbl">Réussite</div></div>
      </div>
      <p class="results-msg" id="res-msg">Bravo !</p>
      <button class="btn btn-primary" onclick="restart()" style="font-size:15px;padding:14px 36px">🔄 Recommencer</button>
    </div>
  </div>

</div>

<script>
const ALL_QUESTIONS = [
  // ── ASSURANCE ──
  {
    cat: "assurance",
    q: "Quel est le mode de gestion des assurances NON-VIE ?",
    opts: ["Capitalisation individuelle", "Répartition collective (mutualisation)", "Forfaitisation", "Réassurance directe"],
    ans: 1,
    expl: "Les assurances non-vie gèrent les primes par répartition : les primes de la communauté des assurés servent à payer les sinistres de la même communauté sur le même exercice."
  },
  {
    cat: "assurance",
    q: "Qui paye la prime dans un contrat d'assurance ?",
    opts: ["L'assuré", "Le bénéficiaire", "L'adhérent / Souscripteur", "L'assureur"],
    ans: 2,
    expl: "L'adhérent (ou souscripteur) est celui qui paye la prime. L'assuré est la personne couverte. Le bénéficiaire perçoit la prestation."
  },
  {
    cat: "assurance",
    q: "En quelle année a été créé le Code des Assurances ?",
    opts: ["1804", "1945", "1976", "1966"],
    ans: 2,
    expl: "Le Code des Assurances est indépendant et a été créé en 1976. Le Code Civil, lui, date de 1804 sous Napoléon."
  },
  {
    cat: "assurance",
    q: "Qu'est-ce que la réassurance ?",
    opts: ["Une assurance pour les particuliers à revenus modestes", "Un mécanisme de transfert de risque d'un assureur vers un réassureur", "Une assurance vie collective pour les entreprises", "Une garantie obligatoire imposée par la loi"],
    ans: 1,
    expl: "La réassurance est l'\"assurance des assureurs\". Elle permet à l'assureur de transférer tout ou partie du risque accepté vers un réassureur pour limiter ses engagements."
  },
  {
    cat: "assurance",
    q: "Quelle autorité délivre l'agrément aux organismes d'assurance en France ?",
    opts: ["L'AMF", "L'ORIAS", "L'ACPR", "La Banque de France"],
    ans: 2,
    expl: "L'ACPR (Autorité de Contrôle Prudentiel et de Résolution) délivre l'agrément. Elle dispose de 6 mois pour se prononcer. L'agrément est publié au Journal Officiel."
  },
  {
    cat: "assurance",
    q: "Combien y a-t-il de branches communautaires en assurance NON-VIE en France ?",
    opts: ["7 branches", "12 branches", "18 branches", "25 branches"],
    ans: 2,
    expl: "Il existe 18 branches communautaires en non-vie et 7 branches en assurance vie en France. C'est le principe de l'agrément par branche."
  },
  {
    cat: "assurance",
    q: "À qui appartient le portefeuille de clients d'un courtier en assurance ?",
    opts: ["À la compagnie d'assurance mandante", "Au courtier lui-même", "À l'ORIAS", "À l'État"],
    ans: 1,
    expl: "Le courtier est commerçant inscrit au RCS. Le portefeuille clients lui APPARTIENT. C'est la grande différence avec l'agent général dont le portefeuille appartient à la compagnie."
  },
  {
    cat: "assurance",
    q: "Qu'est-ce qu'une assurance-vie \"en cas de vie\" (placement) ?",
    opts: ["Un capital versé aux héritiers quoi qu'il arrive", "Un capital versé uniquement si l'assuré est vivant à la date prévue", "Une combinaison vie + décès", "Une assurance pour les biens immobiliers"],
    ans: 1,
    expl: "L'assurance-vie pure (placement) ne verse le capital ou la rente QUE si l'assuré est vivant à la date convenue. Si l'assuré décède avant, l'assureur n'est pas obligé d'intervenir au-delà des sommes versées."
  },
  {
    cat: "assurance",
    q: "Quelle est la différence principale entre assurance FORFAITAIRE et INDEMNITAIRE ?",
    opts: ["Le forfaitaire couvre les biens, l'indemnitaire les personnes", "Le forfaitaire verse une prestation FIXE définie au contrat, l'indemnitaire couvre la valeur réelle du préjudice", "Le forfaitaire est obligatoire, l'indemnitaire est facultatif", "Il n'y a aucune différence pratique"],
    ans: 1,
    expl: "Le forfaitaire = prestation fixe (ex : 100€/mois → garantit 3000€ en cas d'incapacité). Plus cher mais fiable à 100%. L'indemnitaire = valeur réelle (ex : valeur de la maison). Moins cher mais aléatoire."
  },
  {
    cat: "assurance",
    q: "Qu'est-ce que la LPS dans le contexte européen de l'assurance ?",
    opts: ["La Loi de Protection des Souscripteurs", "La Liberté de Prestation de Services — offrir ses services dans un autre État sans y être établi", "La Liquidation Prudentielle de Société", "Le Label de Prévoyance Sociale"],
    ans: 1,
    expl: "LPS = Liberté de Prestation de Services : une entreprise agréée dans un État membre peut offrir ses services dans un autre État membre SANS y être établie. À distinguer de la LE (Liberté d'Établissement) qui nécessite un établissement permanent."
  },
  {
    cat: "assurance",
    q: "La participation aux bénéfices en épargne salariale est-elle obligatoire ?",
    opts: ["Non, toujours facultative", "Oui, obligatoire pour toutes les entreprises", "Oui, obligatoire pour les entreprises de plus de 50 salariés", "Oui, obligatoire pour les entreprises de plus de 250 salariés"],
    ans: 2,
    expl: "La participation est OBLIGATOIRE pour les entreprises de plus de 50 salariés. L'intéressement, lui, est toujours facultatif."
  },
  {
    cat: "assurance",
    q: "Qu'est-ce que l'assurance \"homme-clé\" ?",
    opts: ["Une assurance pour les dirigeants de grands groupes uniquement", "Une assurance garantissant à l'entreprise une indemnité en cas de décès ou incapacité d'une personne essentielle à sa survie", "Une assurance vie classique pour les salariés", "Un régime de retraite complémentaire obligatoire"],
    ans: 1,
    expl: "L'assurance homme-clé couvre l'entreprise contre le risque de décès ou d'incapacité de la personne contribuant à la bonne marche de l'entreprise (dirigeant, expert clé). Elle garantit la pérennité financière."
  },
  {
    cat: "assurance",
    q: "Parmi ces assurances, laquelle est OBLIGATOIRE ?",
    opts: ["L'assurance multirisques habitation", "La complémentaire santé individuelle", "La responsabilité civile", "L'assurance perte d'exploitation"],
    ans: 2,
    expl: "La responsabilité civile est une assurance OBLIGATOIRE. Elle couvre les préjudices causés à des tiers. D'autres assurances obligatoires incluent la RC auto, la décennale pour les constructeurs, la RC pro des intermédiaires."
  },
  // ── MARIAGE & PACS ──
  {
    cat: "mariage",
    q: "Quel régime matrimonial est en vigueur par défaut si les époux ne font PAS de contrat de mariage ?",
    opts: ["La communauté universelle", "La séparation de biens", "La communauté réduite aux acquêts (depuis 1966)", "La participation aux acquêts"],
    ans: 2,
    expl: "Sans contrat de mariage, les époux sont soumis au régime légal : la communauté réduite aux acquêts (appliqué depuis 1966). Le passage chez le notaire n'est obligatoire QUE si les époux veulent un contrat de mariage."
  },
  {
    cat: "mariage",
    q: "Sous la communauté réduite aux acquêts, que se passe-t-il si l'on vend un bien propre sans passer chez le notaire ?",
    opts: ["Le bien reste propre automatiquement", "Le bien est \"dénaturé\" et tombe dans les biens communs", "Le bien doit être partagé 50/50", "La vente est annulée"],
    ans: 1,
    expl: "Un bien propre vendu sans acte notarié est \"dénaturé\" : il perd son caractère propre et tombe dans la communauté. Il faut passer chez le notaire à CHAQUE opération pour conserver le caractère propre."
  },
  {
    cat: "mariage",
    q: "Sous la communauté universelle avec clause d'attribution intégrale, combien de successions y a-t-il pour les enfants ?",
    opts: ["Deux successions (une par parent décédé)", "Une seule succession (au 2e décès)", "Aucune succession, tout est exonéré", "Trois successions possibles"],
    ans: 1,
    expl: "Avec la communauté universelle + clause d'attribution intégrale : au 1er décès, pas de succession (le conjoint récupère tout). Il n'y a donc qu'UNE seule succession au 2e décès. Les enfants ne bénéficient que d'un seul abattement de 100 000€, perdant celui du 1er parent."
  },
  {
    cat: "mariage",
    q: "Un conjoint hérite de 100 000€ et souhaite investir dans un bien immobilier. Quelle condition doit-il respecter pour que ce bien reste un bien PROPRE ?",
    opts: ["Investir au moins 51% de la somme", "Investir 100% de la somme ET passer chez le notaire", "Déclarer l'investissement aux impôts", "Signer un document devant témoin"],
    ans: 1,
    expl: "Pour qu'un bien acquis avec des fonds propres (héritage, donation) reste un bien propre, il faut investir 100% des fonds propres ET passer chez le notaire pour tracer l'origine des fonds. Si on mélange avec un emprunt conjoint, le bien devient commun."
  },
  {
    cat: "mariage",
    q: "Qu'est-ce que la \"participation aux acquêts\" ?",
    opts: ["Un régime communautaire où tous les biens sont communs", "Un régime séparatiste qui permet de partager l'enrichissement du foyer à la dissolution", "Un contrat de mariage obligatoire depuis 2020", "Un dispositif fiscal pour les couples non mariés"],
    ans: 1,
    expl: "La participation aux acquêts est un régime séparatiste : chacun gère ses biens de façon indépendante pendant le mariage, MAIS à la dissolution, on calcule les acquêts de chacun (Patrimoine final − Patrimoine initial) et on partage l'enrichissement. Utile en cas de déséquilibre (ex : un conjoint arrête de travailler)."
  },
  {
    cat: "mariage",
    q: "Sous un régime de séparation de biens, comment est détenu un bien acheté EN COMMUN par les deux époux ?",
    opts: ["En communauté 50/50 obligatoire", "En indivision avec une quote-part définie (ex : 75/25)", "Il appartient automatiquement à l'époux qui a le plus investi", "Il appartient à la compagnie de mariage"],
    ans: 1,
    expl: "En séparation de biens, un achat commun crée une INDIVISION. La quote-part de chacun est définie selon l'apport réel (ex : 75/25, 60/40…). C'est la seule situation où l'indivision différente de 50/50 est possible (en communautaire, c'est d'office 50/50)."
  },
  {
    cat: "mariage",
    q: "Quel est le régime légal (par défaut) du PACS ?",
    opts: ["La communauté universelle", "La participation aux acquêts", "La séparation de biens", "La communauté réduite aux acquêts"],
    ans: 2,
    expl: "Le régime légal du PACS est la séparation de biens. Les biens achetés ensemble sont en indivision 50/50 par défaut (sauf précision chez le notaire). Sur option, les partenaires peuvent choisir le régime d'indivision des acquêts, qui rapproche du régime communautaire."
  },
  {
    cat: "mariage",
    q: "Qu'est-ce que la \"société d'acquêts\" dans un mariage en séparation de biens ?",
    opts: ["Une société civile immobilière classique", "Une structure permettant de mettre EN COMMUN des biens précis tout en restant en séparation de biens", "Le nom du régime communautaire universel", "Un régime obligatoire pour les entrepreneurs"],
    ans: 1,
    expl: "La société d'acquêts est une option dans le régime de séparation de biens. Elle permet de désigner des biens précis qui seront mis en commun (comme si ces biens-là étaient en communauté), sans changer le régime global. Elle se crée chez le notaire."
  },
];

let currentFilter = 'all';
let questions = [];
let currentIdx = 0;
let score = 0;
let answered = [];
let userAnswers = [];

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  restart();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function restart() {
  const pool = currentFilter === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.cat === currentFilter);
  questions = shuffle(pool);
  currentIdx = 0;
  score = 0;
  answered = new Array(questions.length).fill(false);
  userAnswers = new Array(questions.length).fill(null);
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  renderQ();
}

function renderQ() {
  const q = questions[currentIdx];
  const total = questions.length;
  const opts = shuffle(q.opts.map((o, i) => ({ text: o, origIdx: i })));

  // Progress
  document.getElementById('progress-bar').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('q-counter').textContent = `Question ${currentIdx + 1} / ${total}`;
  document.getElementById('score-label').textContent = `Score : ${score}`;

  // Category badge
  const catEl = document.getElementById('q-cat');
  if (q.cat === 'assurance') {
    catEl.className = 'q-category assurance';
    catEl.textContent = '🛡 Assurance';
  } else {
    catEl.className = 'q-category mariage';
    catEl.textContent = '💍 Mariage & PACS';
  }

  document.getElementById('q-text').textContent = q.q;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;

    // If already answered this question
    if (answered[currentIdx]) {
      btn.classList.add('disabled');
      btn.disabled = true;
      const isCorrect = opt.origIdx === q.ans;
      const isChosen = userAnswers[currentIdx] === opt.origIdx;
      if (isCorrect) btn.classList.add('correct');
      else if (isChosen) btn.classList.add('wrong');
    } else {
      btn.onclick = () => selectAnswer(opt.origIdx, opts, q);
    }
    list.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedback');
  if (answered[currentIdx]) {
    const wasCorrect = userAnswers[currentIdx] === q.ans;
    fb.style.display = 'block';
    fb.className = 'feedback ' + (wasCorrect ? 'correct' : 'wrong');
    document.getElementById('fb-title').textContent = wasCorrect ? '✅ Bonne réponse !' : '❌ Mauvaise réponse';
    document.getElementById('fb-body').textContent = q.expl;
  } else {
    fb.style.display = 'none';
  }

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = !answered[currentIdx];
  document.getElementById('btn-next').textContent = currentIdx === total - 1 ? 'Voir résultats 🏆' : 'Suivant →';
}

function selectAnswer(origIdx, opts, q) {
  answered[currentIdx] = true;
  userAnswers[currentIdx] = origIdx;

  const isCorrect = origIdx === q.ans;
  if (isCorrect) score++;

  // Style options
  const btns = document.querySelectorAll('.option');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    btn.disabled = true;
    btn.onclick = null;
    const opt = opts[i];
    if (opt.origIdx === q.ans) btn.classList.add('correct');
    else if (opt.origIdx === origIdx) btn.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('fb-title').textContent = isCorrect ? '✅ Bonne réponse !' : '❌ Mauvaise réponse';
  document.getElementById('fb-body').textContent = q.expl;

  document.getElementById('btn-next').disabled = false;
  document.getElementById('score-label').textContent = `Score : ${score}`;
}

function nextQ() {
  if (currentIdx === questions.length - 1) {
    showResults();
  } else {
    currentIdx++;
    renderQ();
  }
}

function prevQ() {
  if (currentIdx > 0) { currentIdx--; renderQ(); }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round(score / total * 100);

  document.getElementById('res-score').textContent = `${score}/${total}`;
  document.getElementById('res-ok').textContent = score;
  document.getElementById('res-ko').textContent = total - score;
  document.getElementById('res-pct').textContent = pct + '%';

  let emoji, msg;
  if (pct >= 90) { emoji = '🏆'; msg = "Excellent ! Tu maîtrises parfaitement ces thèmes. Prêt(e) pour l'oral !"; }
  else if (pct >= 75) { emoji = '🎯'; msg = "Très bien ! Quelques points à consolider mais tu es sur la bonne voie."; }
  else if (pct >= 55) { emoji = '📚'; msg = "Pas mal ! Reprends les fiches sur les points ratés et refais le quiz."; }
  else { emoji = '💪'; msg = "Continue les révisions ! Relis les fiches mémo et retente le quiz."; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-msg').textContent = msg;
}

// Init
restart();
</script>
